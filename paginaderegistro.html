<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MisApuntes - Inicio de sesión</title>
    <link rel="stylesheet" href="styleregistro.css">
</head>
<body>

    <div class="container">
        <div class="form-container">
            <h1>MisApuntes</h1>
            <p class="description">Tu aplicación de notas para estudiantes</p>

            <form action="#">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="tu@email.com">

                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="******">

                <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>

                <button type="submit" class="btn">Iniciar sesión</button>

                <p class="divider">O continúa con</p>

                <div class="social-buttons">
                    <button class="social-btn google">Google</button>
                    <button class="social-btn apple">Apple</button>
                </div>

                <p class="register-link">¿No tienes cuenta? <a href="#">Regístrate</a></p>
            </form>
        </div>
    </div>

</body>
</html>
