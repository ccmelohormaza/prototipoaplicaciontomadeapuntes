<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MisApuntes - Grabación de clase</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <main class="phone">

    <!-- Barra superior -->
    <header class="topbar">
      <button class="icon-btn">
        <span>‹</span>
      </button>

      <div class="class-title">
        <h1>Clase 01 - Límites</h1>
        <p>Matemáticas</p>
      </div>

      <button class="icon-btn">
        <span>⋮</span>
      </button>
    </header>

    <!-- Información de la clase -->
    <section class="info-card">
      <div>
        <span class="subject-tag">Matemáticas</span>
        <h2>Grabación de clase</h2>
        <p>17/05/2026</p>
      </div>

      <div class="recording-badge">
        <span class="red-dot"></span>
        Grabando
      </div>
    </section>

    <!-- Estado de grabación -->
    <section class="recording-status">
      <p class="status-label">Tiempo de grabación</p>
      <h3>00:24:36</h3>
      <p class="status-text">Grabación en curso</p>
    </section>

    <!-- Onda de audio -->
    <section class="audio-card">
      <div class="audio-wave">
        <span class="bar small"></span>
        <span class="bar medium"></span>
        <span class="bar tall"></span>
        <span class="bar short"></span>
        <span class="bar high"></span>
        <span class="bar medium"></span>
        <span class="bar tall"></span>
        <span class="bar small"></span>
        <span class="bar high"></span>
        <span class="bar short"></span>
        <span class="bar tall"></span>
        <span class="bar medium"></span>
        <span class="bar small"></span>
        <span class="bar high"></span>
        <span class="bar medium"></span>
        <span class="bar short"></span>
        <span class="bar tall"></span>
      </div>
    </section>

    <!-- Botón principal -->
    <section class="main-record">
      <button class="record-btn">
        <span class="pause-icon"></span>
      </button>
      <p>Pausar grabación</p>
    </section>

    <!-- Acciones rápidas -->
    <section class="quick-actions">
      <button class="action-btn">
        <span>⏸</span>
        <p>Pausar</p>
      </button>

      <button class="action-btn">
        <span>📷</span>
        <p>Foto</p>
      </button>

      <button class="action-btn">
        <span>✎</span>
        <p>Nota</p>
      </button>

      <button class="action-btn finish">
        <span>■</span>
        <p>Finalizar</p>
      </button>
    </section>

    <!-- Notas rápidas -->
    <section class="notes-card">
      <div class="notes-header">
        <h3>Notas rápidas</h3>
        <span>Durante la clase</span>
      </div>

      <textarea placeholder="Escribe algo rápidamente..."></textarea>
    </section>

  </main>

</body>
</html>
